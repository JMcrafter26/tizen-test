name: Publish to npm
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL: Allows OIDC token generation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm publish --provenance # Provenance links the build to your GitHub source